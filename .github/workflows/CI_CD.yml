name: Build & Push & Deploy Frontend Image

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ahmednasser04
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/graduation-project-sha/frontend:latest
            ghcr.io/graduation-project-sha/frontend:1.${{ github.run_number }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Continuous Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: wiqaya.duckdns.org
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -af
